<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envault</title>
  <link rel="stylesheet" href="normalize.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>env<span>vault</span></h1>
  <div id="status"></div>
</header>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-label">Projects</div>
    <div class="project-list" id="project-list"></div>
    <div class="sidebar-footer">
      <input id="new-project" type="text" placeholder="New project…" />
    </div>
  </nav>

  <div class="main">
    <div class="toolbar" id="toolbar">
      <span class="empty" style="height:auto;color:var(--muted);">Select a project</span>
    </div>
    <textarea id="editor" placeholder="Select a file to edit…" disabled></textarea>
  </div>
</div>

<!-- Modal: new file -->
<div class="overlay hidden" id="file-modal">
  <div class="modal">
    <h2>New file</h2>
    <input id="file-name" type="text" placeholder=".env" />
    <div class="modal-row">
      <button class="btn-ghost" id="file-cancel">Cancel</button>
      <button class="btn btn-primary" id="file-confirm">Create</button>
    </div>
  </div>
</div>

<!-- Modal: API key -->
<div class="overlay hidden" id="key-modal">
  <div class="modal">
    <h2>API Key</h2>
    <p id="key-msg"></p>
    <div class="key-wrap">
      <input id="key-input" type="password" placeholder="Enter your API key" autocomplete="current-password" />
      <button id="key-toggle">👁</button>
    </div>
    <div class="modal-row">
      <button class="btn btn-primary" id="key-confirm">Connect</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
